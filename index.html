<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Змейка | Классическая игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="info-panel">
            <div class="score-box">
                <span>🍎 СЧЁТ</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="best-box">
                <span>🏆 РЕКОРД</span>
                <span id="bestValue">0</span>
            </div>
        </div>
        
        <canvas id="snakeCanvas" width="500" height="500"></canvas>
        
        <div class="controls">
            <button id="upBtn" aria-label="вверх">▲</button>
            <button id="leftBtn" aria-label="влево">◀</button>
            <button id="downBtn" aria-label="вниз">▼</button>
            <button id="rightBtn" aria-label="вправо">▶</button>
            <button id="restartBtn" class="restart-btn">🔄 НОВАЯ</button>
        </div>
        
        <div class="status" id="gameStatus">▶ ИГРА АКТИВНА</div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
